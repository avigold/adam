[alembic]
script_location = %(here)s/src/adam/db/migrations
prepend_sys_path = .
    src
path_separator = os
# Alembic migrations are only needed for Postgres.
# SQLite uses init_db() to create tables directly from models.
# To use Postgres: pip install adam[postgres] and set this URL.
sqlalchemy.url = postgresql+asyncpg://adam:adam@localhost:5450/adam

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
